name: Build and Publish to GHCR

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        if: github.event_name != 'pull_request'
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            ${{env.REGISTRY}}/${{env.IMAGE_NAME}}:${{github.sha}}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Generate artifact attestation
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      - name: Fetch deploy secrets from Infisical
        uses: Infisical/secrets-action@v1.0.9
        with:
          method: 'universal'
          identity-id: '25ed8732-32ba-4f81-9f25-36dfa85283e4'
          domain: 'https://infisical.6cclab.dev'
          env-slug: 'dev'
          secret-path: /deploy
          project-slug: 'github-actions-wc-rx'
          client-id: ${{ secrets.INFISICAL_CLIENT_ID }}
          client-secret: ${{ secrets.INFISICAL_CLIENT_SECRET }}

      - name: Check out deployment repo code
        uses: actions/checkout@v4
        with:
          ref: main
          path: deployment
          repository: 6cclab/mcp-deployments
          token: ${{ env.PAT }}

      - name: Install Kustomize
        if: github.event_name != 'pull_request'
        shell: bash
        run: curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh"  | bash

      - name: Update deployment tag
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          cd deployment
          git config --global user.name "GH Actions"
          # Always sync first
          git pull --rebase
          cd ot-knowledge-mcp/envs/dev
          ../../../../kustomize edit set image \
            ${{env.REGISTRY}}/${{ env.IMAGE_NAME }}=${{env.REGISTRY}}/${{ env.IMAGE_NAME }}:${{github.sha}}
          cd ../../../
          git add .
          if git diff --cached --quiet; then
            echo "No changes detected"
            exit 0
          fi
          git commit -m "set ot-knowledge-mcp dev to ${{github.sha}}"
          git push origin main

      - name: Sync ArgoCD
        id: argo-sync
        uses: clowdhaus/argo-cd-action/@main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          version: 3.2.1
          command: app
          options: sync mcp --server argocd.apps.dev-01.6cclab.dev --auth-token ${{ env.ARGO_TOKEN }}
